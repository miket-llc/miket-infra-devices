---
# Deploy OpenConnect VPN Client to Linux Nodes
#
# Installs OpenConnect (Cisco AnyConnect-compatible) and creates a
# NetworkManager VPN profile for the Ellucian VPN.
#
# Usage:
#   # Deploy to all target nodes
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy-openconnect-vpn.yml
#
#   # Deploy to specific host
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy-openconnect-vpn.yml --limit akira
#
#   # Dry-run first (ALWAYS do this)
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy-openconnect-vpn.yml --check --diff

- name: Deploy OpenConnect VPN to Linux Nodes
  hosts: fedora_kde_workstations:headless_servers
  gather_facts: yes

  roles:
    - role: openconnect_vpn
      tags:
        - openconnect
        - vpn
