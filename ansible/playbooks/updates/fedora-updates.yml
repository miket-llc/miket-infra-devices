---
# Fedora System Updates Playbook
# Purpose: Update Fedora systems with security and critical updates
# Scope: dnf package updates, kernel cleanup, Tailscale updates
# Idempotent: Yes - only updates when new packages are available
#
# Usage:
#   # Check what would be updated (dry run)
#   ansible-playbook -i inventory/hosts.yml ansible/playbooks/updates/fedora-updates.yml --check --diff
#
#   # Update all Fedora systems
#   ansible-playbook -i inventory/hosts.yml ansible/playbooks/updates/fedora-updates.yml
#
#   # Update specific host
#   ansible-playbook -i inventory/hosts.yml ansible/playbooks/updates/fedora-updates.yml --limit motoko
#
# Tags:
#   - pre-check: Pre-flight checks only
#   - updates: Package updates
#   - tailscale: Tailscale-specific updates
#   - cleanup: Cleanup tasks
#   - security: Security-related tasks only

- name: Update Fedora Systems
  hosts: linux
  gather_facts: true
  become: true

  vars:
    update_report: []
    update_failed: false

  tasks:
    - name: Skip non-Fedora hosts
      meta: end_host
      when: ansible_os_family != "RedHat"

    - name: Display update information
      debug:
        msg:
          - "================================================================"
          - "  Fedora System Updates: {{ inventory_hostname }}"
          - "================================================================"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "Update Strategy: Security + Critical Updates"
          - "Auto Reboot: Disabled (notify only)"
          - "================================================================"
      tags: [always, pre-check]

    # Pre-flight checks
    - name: Check disk space
      shell: df -h / | tail -1 | awk '{print $4}' | sed 's/G//'
      register: disk_free_gb
      changed_when: false
      failed_when: false
      tags: [pre-check, always]

    - name: Verify sufficient disk space
      assert:
        that:
          - disk_free_gb.stdout is defined
          - disk_free_gb.stdout | float >= 5
        fail_msg: "Insufficient disk space: {{ disk_free_gb.stdout | default('unknown') }}GB free (minimum 5GB required)"
        success_msg: "Disk space check passed: {{ disk_free_gb.stdout }}GB free"
      when:
        - disk_free_gb.stdout is defined
        - disk_free_gb.stdout | regex_search('^[0-9.]+$') is not none
      tags: [pre-check, always]

    - name: Check Tailscale status before updates
      command: tailscale status --json
      register: tailscale_pre_status
      changed_when: false
      failed_when: false
      tags: [pre-check, tailscale, always]

    - name: Display Tailscale status
      debug:
        msg: "Tailscale: {{ 'Online' if tailscale_pre_status.rc == 0 else 'OFFLINE - will attempt to fix' }}"
      tags: [pre-check, tailscale, always]

    # DNF updates
    - name: Check for available updates
      dnf:
        list: updates
      register: available_updates
      changed_when: false
      tags: [updates, always]

    - name: Display available updates count
      debug:
        msg: "Found {{ available_updates.results | length }} available updates"
      tags: [updates, always]

    - name: List updates to be applied
      debug:
        msg: "{{ item.name }}-{{ item.version }}"
      loop: "{{ available_updates.results[:20] }}"
      loop_control:
        label: "{{ item.name }}"
      when: available_updates.results | length > 0
      tags: [updates]

    - name: Update all packages (security + bugfix)
      dnf:
        name: "*"
        state: latest
        security: "{{ update_security_only | default(false) }}"
        update_cache: yes
      register: dnf_update
      tags: [updates, security]

    - name: Display update results
      debug:
        msg: "Packages updated: {{ dnf_update.changed | default('skipped (not run in this mode)') }}"
      tags: [updates, always]

    # Tailscale-specific updates
    - name: Ensure Tailscale is updated
      dnf:
        name: tailscale
        state: latest
      register: tailscale_update
      tags: [updates, tailscale]

    - name: Restart Tailscale if updated
      systemd:
        name: tailscaled
        state: restarted
        enabled: yes
      when: tailscale_update.changed | default(false)
      tags: [updates, tailscale]

    - name: Wait for Tailscale to reconnect
      command: tailscale status
      register: tailscale_reconnect
      until: tailscale_reconnect.rc == 0
      retries: 6
      delay: 10
      when: tailscale_update.changed | default(false)
      changed_when: false
      failed_when: false
      tags: [updates, tailscale]

    - name: Verify Tailscale SSH is working
      command: tailscale status --json
      register: tailscale_post_status
      changed_when: false
      failed_when: false
      tags: [verify, tailscale, always]

    - name: Display Tailscale post-update status
      debug:
        msg: "Tailscale post-update: {{ 'Online' if tailscale_post_status.rc == 0 else 'NEEDS ATTENTION' }}"
      tags: [verify, tailscale, always]

    # Kernel cleanup
    - name: Get installed kernels
      shell: rpm -qa kernel-core | wc -l
      register: kernel_count
      changed_when: false
      tags: [cleanup]

    - name: Clean up old kernels (keep last 2)
      shell: dnf remove -y $(dnf repoquery --installonly --latest-limit=-2 -q)
      when:
        - kernel_count.stdout | int > 2
        - update_cleanup_old_kernels | default(true)
      register: kernel_cleanup
      changed_when: "'Removed' in kernel_cleanup.stdout"
      failed_when: false
      tags: [cleanup]

    - name: Clean dnf cache
      dnf:
        autoremove: yes
      when: update_autoremove | default(true)
      tags: [cleanup]

    # Check if reboot required
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      failed_when: false
      tags: [verify, always]

    - name: Check for kernel updates requiring reboot
      shell: |
        CURRENT=$(uname -r)
        LATEST=$(rpm -qa kernel-core --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' | sort -V | tail -1)
        if [ "$CURRENT" != "$LATEST" ]; then
          echo "Reboot recommended: running $CURRENT, latest is $LATEST"
          exit 1
        fi
        echo "Kernel is current: $CURRENT"
      register: kernel_check
      changed_when: false
      failed_when: false
      tags: [verify, always]

    - name: Generate update summary
      debug:
        msg:
          - "================================================================"
          - "  Update Summary: {{ inventory_hostname }}"
          - "================================================================"
          - "Packages Updated: {{ 'Yes' if dnf_update.changed | default(false) else ('No (already up to date)' if dnf_update is defined else 'Skipped (verify-only mode)') }}"
          - "Updates Available: {{ available_updates.results | length }}"
          - "Tailscale Updated: {{ 'Yes' if tailscale_update.changed | default(false) else ('No' if tailscale_update is defined else 'Skipped (verify-only mode)') }}"
          - "Tailscale Status: {{ 'Online' if tailscale_post_status.rc == 0 else 'NEEDS ATTENTION' }}"
          - "Kernel Status: {{ kernel_check.stdout }}"
          - "Reboot Required: {{ 'Yes' if kernel_check.rc != 0 else 'No' }}"
          - "================================================================"
      tags: [always]

    - name: Warn if reboot is needed
      debug:
        msg: "WARNING: {{ inventory_hostname }} needs a reboot for kernel updates to take effect"
      when: kernel_check.rc != 0
      tags: [always]

    # ========================================
    # Service Health Checks (per-host)
    # ========================================

    # Common services (all hosts)
    - name: Ensure sshd is running
      systemd:
        name: sshd
        state: started
        enabled: yes
      tags: [services, verify]

    - name: Ensure tailscaled is running
      systemd:
        name: tailscaled
        state: started
        enabled: yes
      tags: [services, verify, tailscale]

    - name: Ensure firewalld is running
      systemd:
        name: firewalld
        state: started
        enabled: yes
      failed_when: false
      tags: [services, verify]

    # Akira services (storage SoR, Nextcloud, LiteLLM, vLLM, monitoring)
    - name: Ensure Akira services are running
      block:
        - name: Ensure Podman socket is running
          systemd:
            name: podman.socket
            state: started
            enabled: yes

        - name: Check Nextcloud container status
          command: podman ps --filter "name=nextcloud" --format "{{ '{{' }}.Status{{ '}}' }}"
          register: nextcloud_status
          changed_when: false
          failed_when: false

        - name: Start Nextcloud if not running
          command: podman start nextcloud-app nextcloud-db nextcloud-redis
          when: "'Up' not in nextcloud_status.stdout"
          failed_when: false

        - name: Check LiteLLM container status
          command: podman ps --filter "name=litellm" --format "{{ '{{' }}.Status{{ '}}' }}"
          register: litellm_status
          changed_when: false
          failed_when: false

        - name: Check vLLM service status
          systemd:
            name: vllm
            state: started
          failed_when: false
          register: vllm_status

        - name: Check Prometheus is running
          command: podman ps --filter "name=prometheus" --format "{{ '{{' }}.Status{{ '}}' }}"
          register: prometheus_status
          changed_when: false
          failed_when: false

        - name: Check Grafana is running
          command: podman ps --filter "name=grafana" --format "{{ '{{' }}.Status{{ '}}' }}"
          register: grafana_status
          changed_when: false
          failed_when: false

        - name: Check node_exporter is running
          systemd:
            name: node_exporter
            state: started
            enabled: yes
          failed_when: false

        - name: Display Akira service status
          debug:
            msg:
              - "Nextcloud: {{ 'Running' if 'Up' in nextcloud_status.stdout else 'NOT RUNNING' }}"
              - "LiteLLM: {{ 'Running' if 'Up' in litellm_status.stdout else 'NOT RUNNING' }}"
              - "vLLM: {{ 'Running' if vllm_status.status.ActiveState | default('unknown') == 'active' else 'NOT RUNNING' }}"
              - "Prometheus: {{ 'Running' if 'Up' in prometheus_status.stdout else 'NOT RUNNING' }}"
              - "Grafana: {{ 'Running' if 'Up' in grafana_status.stdout else 'NOT RUNNING' }}"
      when: inventory_hostname == 'akira'
      tags: [services, verify]

    # Motoko services (control node, cloudflared)
    - name: Ensure Motoko services are running
      block:
        - name: Ensure cloudflared is running
          systemd:
            name: cloudflared
            state: started
            enabled: yes
          failed_when: false
          register: cloudflared_status

        - name: Check node_exporter is running
          systemd:
            name: node_exporter
            state: started
            enabled: yes
          failed_when: false

        - name: Display Motoko service status
          debug:
            msg:
              - "Cloudflared: {{ 'Running' if cloudflared_status.status.ActiveState | default('unknown') == 'active' else 'NOT RUNNING' }}"
      when: inventory_hostname == 'motoko'
      tags: [services, verify]

    # Armitage services (Ollama workstation)
    - name: Ensure Armitage services are running
      block:
        - name: Ensure Ollama is running
          systemd:
            name: ollama
            state: started
            enabled: yes
          failed_when: false
          register: ollama_status

        - name: Check node_exporter is running
          systemd:
            name: node_exporter
            state: started
            enabled: yes
          failed_when: false

        - name: Display Armitage service status
          debug:
            msg:
              - "Ollama: {{ 'Running' if ollama_status.status.ActiveState | default('unknown') == 'active' else 'NOT RUNNING' }}"
      when: inventory_hostname == 'armitage'
      tags: [services, verify]

    # Atom services (basecamp/resilience node)
    - name: Ensure Atom services are running
      block:
        - name: Check node_exporter is running
          systemd:
            name: node_exporter
            state: started
            enabled: yes
          failed_when: false

        - name: Display Atom service status
          debug:
            msg: "Atom is a resilience node - minimal services expected"
      when: inventory_hostname == 'atom'
      tags: [services, verify]

    # Final service summary
    - name: Final health check - Tailscale connectivity
      command: tailscale ping -c 1 {{ item }}
      loop:
        - akira
        - motoko
      register: tailscale_ping
      changed_when: false
      failed_when: false
      when: inventory_hostname != item
      tags: [verify, tailscale]

    - name: Display final status
      debug:
        msg:
          - "================================================================"
          - "  SERVICE STATUS: {{ inventory_hostname }}"
          - "================================================================"
          - "Tailscale: {{ 'Connected' if tailscale_post_status.rc == 0 else 'DISCONNECTED' }}"
          - "SSH: Running (you are connected)"
          - "Updates: {{ 'Applied' if dnf_update.changed | default(false) else ('Already current' if dnf_update is defined else 'Skipped (verify-only mode)') }}"
          - "================================================================"
      tags: [always]
