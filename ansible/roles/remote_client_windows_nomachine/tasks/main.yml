---
# Ansible role: remote_client_windows_nomachine
# Installs NoMachine client on Windows hosts via Chocolatey

- name: Check if Chocolatey is installed
  win_shell: |
    if (Get-Command choco -ErrorAction SilentlyContinue) {
      Write-Output "INSTALLED"
    } else {
      Write-Output "NOT_INSTALLED"
    }
  register: choco_check
  changed_when: false

- name: Install Chocolatey if not present
  win_shell: |
    Set-ExecutionPolicy Bypass -Scope Process -Force
    [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
    iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
  when: "'NOT_INSTALLED' in choco_check.stdout"
  register: choco_install

- name: Install NoMachine client via Chocolatey
  win_chocolatey:
    name: nomachine
    state: present
  register: nomachine_client_installed

- name: Ensure NoMachine AppData directory exists
  ansible.windows.win_file:
    path: "C:\\Users\\{{ ansible_user }}\\AppData\\Roaming\\NoMachine"
    state: directory
  when: nomachine_client_installed.changed or nomachine_client_installed.changed == false

- name: Archive existing broken or stale connections (Windows)
  ansible.windows.win_shell: |
    $archiveDir = "C:\Users\{{ ansible_user }}\AppData\Roaming\NoMachine\archive-$(Get-Date -Format 'yyyyMMdd')"
    $connDir = "C:\Users\{{ ansible_user }}\AppData\Roaming\NoMachine"
    
    if (Test-Path $connDir) {
      New-Item -ItemType Directory -Path $archiveDir -Force | Out-Null
      $archived = $false
      
      Get-ChildItem -Path $connDir -Recurse -Filter "*.nxs","*.nxp" -ErrorAction SilentlyContinue | ForEach-Object {
        $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
        if ($content -and $content -notmatch "pangolin-vega\.ts\.net:4000") {
          Move-Item $_.FullName $archiveDir -Force -ErrorAction SilentlyContinue
          $archived = $true
        }
      }
      
      if (-not $archived) {
        Remove-Item $archiveDir -Force -ErrorAction SilentlyContinue
        Write-Output "No stale connections to archive"
      } else {
        Write-Output "Archived stale connections to $archiveDir"
      }
    } else {
      Write-Output "No connections directory found"
    }
  register: archive_result_windows
  changed_when: "'Archived' in archive_result_windows.stdout"

- name: Create NoMachine connection helper script (Windows)
  ansible.windows.win_copy:
    content: |
      # NoMachine connection helper for Windows
      # Usage: nomachine-connect [HOSTNAME]
      param([string]$Hostname = "motoko")
      
      $Target = "${Hostname}.pangolin-vega.ts.net:4000"
      
      # Map hostname to display name
      $DisplayName = switch ($Hostname) {
        "motoko" { "motoko-console" }
        "wintermute" { "wintermute-console" }
        "armitage" { "armitage-console" }
        default { "${Hostname}-console" }
      }
      
      # Try both nxplayer.exe (newer) and nxclient.exe (older)
      $ClientPath = "C:\Program Files\NoMachine\bin\nxplayer.exe"
      if (-not (Test-Path $ClientPath)) {
        $ClientPath = "C:\Program Files\NoMachine\bin\nxclient.exe"
      }
      
      if (Test-Path $ClientPath) {
        # Launch NoMachine client with connection
        & $ClientPath --session $Target
      } else {
        Write-Error "NoMachine not found. Install from https://www.nomachine.com/download"
        exit 1
      }
    dest: "C:\\Windows\\System32\\nomachine-connect.ps1"
    mode: '0755'

- name: Create connection documentation (Windows)
  ansible.windows.win_copy:
    content: |
      # NoMachine Saved Connections
      # Auto-generated by Ansible - Do not edit manually
      
      To connect to a server, use one of these methods:
      
      1. Command line (PowerShell):
         nomachine-connect motoko
         nomachine-connect wintermute
         nomachine-connect armitage
      
      2. GUI:
         Open NoMachine from Start Menu, then manually add these connections:
         - motoko-console: motoko.pangolin-vega.ts.net:4000
         - wintermute-console: wintermute.pangolin-vega.ts.net:4000
         - armitage-console: armitage.pangolin-vega.ts.net:4000
      
      All connections use Tailscale MagicDNS and port 4000.
    dest: "C:\\Users\\{{ ansible_user }}\\AppData\\Roaming\\NoMachine\\CONNECTIONS.txt"

- name: Display NoMachine client installation status
  ansible.builtin.debug:
    msg:
      - "✅ NoMachine client installed and configured"
      - "Launch from: Start Menu > NoMachine"
      - "Command line: nomachine-connect [HOSTNAME]"
      - "Saved connections:"
      - "  - motoko-console (motoko.pangolin-vega.ts.net:4000)"
      - "  - wintermute-console (wintermute.pangolin-vega.ts.net:4000)"
      - "  - armitage-console (armitage.pangolin-vega.ts.net:4000)"

