- name: Install secrets-drift.timer
  ansible.builtin.template:
    src: secrets-drift.timer.j2
    dest: /etc/systemd/system/secrets-drift.timer
    owner: root
    group: root
    mode: '0644'
  notify:
    - ops-verify daemon-reload
    - restart secrets-drift timer

- name: Enable secrets-drift.timer
  ansible.builtin.systemd:
    name: secrets-drift.timer
    enabled: true
    state: started
    daemon_reload: true

# ---------------------------------------------------------------------------
# Weekly recovery attestation (break-glass FIDO2 + SSPR)
# Needs the ops_verify SPN cert in kv-miket-ops/ops-verify-sp-cert-pfx
# and its appId at kv-miket-ops/ops-verify-sp-app-id — provisioned
# manually once and documented in the role README.
# ---------------------------------------------------------------------------

- name: Ensure recovery-attestation report dir exists on /space
  ansible.builtin.file:
    path: /space/_ops/reports/recovery
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install recovery-attestation script
