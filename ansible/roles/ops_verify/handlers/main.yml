---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  listen: ops-verify daemon-reload

- name: Restart dkim-verify.timer
  ansible.builtin.systemd:
    name: dkim-verify.timer
    state: restarted
    enabled: true
  listen: restart dkim-verify timer

- name: Restart email-health.timer
  ansible.builtin.systemd:
    name: email-health.timer
    state: restarted
    enabled: true
  listen: restart email-health timer

- name: Restart dmarc-summary.timer
  ansible.builtin.systemd:
    name: dmarc-summary.timer
    state: restarted
    enabled: true
  listen: restart dmarc-summary timer
