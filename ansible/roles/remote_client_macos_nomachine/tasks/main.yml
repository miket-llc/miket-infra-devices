---
# Ansible role: remote_client_macos_nomachine
# Installs NoMachine client on macOS hosts for accessing remote NoMachine servers

- name: Check if NoMachine client is already installed
  ansible.builtin.stat:
    path: /Applications/NoMachine.app
  register: nomachine_client_app

- name: Download NoMachine client installer for macOS
  ansible.builtin.shell: |
    cd /tmp
    curl -L -f -o nomachine_{{ nomachine_version }}.dmg "{{ nomachine_macos_url }}" || \
    wget -O nomachine_{{ nomachine_version }}.dmg "{{ nomachine_macos_url }}"
  when: not nomachine_client_app.stat.exists
  args:
    creates: "/tmp/nomachine_{{ nomachine_version }}.dmg"

- name: Mount DMG and install NoMachine client
  ansible.builtin.shell: |
    hdiutil attach /tmp/nomachine_{{ nomachine_version }}.dmg -nobrowse -quiet
    sudo installer -pkg /Volumes/NoMachine/NoMachine.pkg -target /
    hdiutil detach /Volumes/NoMachine -quiet
  when: not nomachine_client_app.stat.exists
  become: false

- name: Clean up installer DMG
  ansible.builtin.file:
    path: "/tmp/nomachine_{{ nomachine_version }}.dmg"
    state: absent

- name: Ensure NoMachine Application Support directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Library/Application Support/NoMachine"
    state: directory
    mode: '0755'
  when: nomachine_client_app.stat.exists

- name: Disable auto-discovery (prevents confusing LAN-based connections)
  ansible.builtin.shell: |
    CONFIG_FILE="{{ ansible_env.HOME }}/.nx/config/player.cfg"
    if [ -f "$CONFIG_FILE" ]; then
      # Disable network discovery to prevent finding servers via LAN
      # Users will manually add Tailscale-based connections instead
      sed -i.bak 's/<option key="Discover other NoMachine servers in the network" value="true" \/>/<option key="Discover other NoMachine servers in the network" value="false" \/>/g' "$CONFIG_FILE"
      echo "Auto-discovery disabled"
    else
      echo "Config file not found (will be created on first launch)"
    fi
  register: discovery_result
  changed_when: "'Auto-discovery disabled' in discovery_result.stdout"
  when: nomachine_client_app.stat.exists

- name: Archive existing broken or stale connections (macOS)
  ansible.builtin.shell: |
    NOMACHINE_DIR='{{ ansible_env.HOME }}/Library/Application Support/NoMachine'
    ARCHIVE_DIR="$NOMACHINE_DIR/archive-$(date +%Y%m%d)"
    mkdir -p "$ARCHIVE_DIR" || true
    ARCHIVED=0
    if [ -d "$NOMACHINE_DIR" ]; then
      find "$NOMACHINE_DIR" -maxdepth 2 -type f \( -name "*.nxs" -o -name "*.nxp" \) 2>/dev/null | while read -r f; do
        if ! grep -q "pangolin-vega.ts.net:4000" "$f" 2>/dev/null; then
          mv "$f" "$ARCHIVE_DIR/" 2>/dev/null && ARCHIVED=1 || true
        fi
      done
    fi
    if [ -d "$ARCHIVE_DIR" ] && [ "$(ls -A "$ARCHIVE_DIR" 2>/dev/null)" ]; then
      echo "Archived stale connections to $ARCHIVE_DIR"
    else
      rmdir "$ARCHIVE_DIR" 2>/dev/null || true
      echo "No stale connections to archive"
    fi
  register: archive_result_macos
  changed_when: "'Archived' in archive_result_macos.stdout"
  when: nomachine_client_app.stat.exists

- name: Ensure user bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'
  when: nomachine_client_app.stat.exists

- name: Create NoMachine connection helper script (macOS)
  ansible.builtin.template:
    src: nomachine_connect.sh.j2
    dest: "{{ ansible_env.HOME }}/.local/bin/nomachine-connect"
    mode: '0755'
  when: nomachine_client_app.stat.exists

- name: Ensure user bin is in PATH (macOS)
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: true
    regexp: '^export PATH=.*\.local/bin'
  when: nomachine_client_app.stat.exists

- name: Create connection documentation (macOS)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/Library/Application Support/NoMachine/CONNECTIONS.txt"
    content: |
      # NoMachine Saved Connections
      # Auto-generated by Ansible - Do not edit manually
      
      To connect to a server, use one of these methods:
      
      1. Command line:
         nomachine-connect motoko
         nomachine-connect wintermute
         nomachine-connect armitage
      
      2. GUI:
         Open NoMachine.app, then manually add these connections:
         - motoko-console: motoko.pangolin-vega.ts.net:4000
         - wintermute-console: wintermute.pangolin-vega.ts.net:4000
         - armitage-console: armitage.pangolin-vega.ts.net:4000
      
      All connections use Tailscale MagicDNS and port 4000.
    mode: '0644'
  when: nomachine_client_app.stat.exists

- name: Display NoMachine client installation status
  ansible.builtin.debug:
    msg:
      - "✅ NoMachine client installed and configured"
      - "Launch from: /Applications/NoMachine.app"
      - "Saved connections:"
      - "  - motoko-console (motoko.pangolin-vega.ts.net:4000)"
      - "  - wintermute-console (wintermute.pangolin-vega.ts.net:4000)"
      - "  - armitage-console (armitage.pangolin-vega.ts.net:4000)"
      - "Keyboard tip: macOS Command key maps to Ctrl in remote sessions"


