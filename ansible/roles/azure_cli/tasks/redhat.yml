---
# Fedora / RHEL Azure CLI installation
# Azure CLI is required for Key Vault secret access
# https://learn.microsoft.com/en-us/cli/azure/install-azure-cli-linux?pivots=dnf

- name: Check if Azure CLI is installed
  ansible.builtin.command: which az
  register: az_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Check Azure CLI version if installed
  ansible.builtin.command: az version --output json
  register: az_version_check
  changed_when: false
  failed_when: false
  when: az_check.rc == 0

- name: Display current Azure CLI installation status
  ansible.builtin.debug:
    msg: "Azure CLI {{ 'is installed' if az_check.rc == 0 else 'is not installed' }}"

- name: Import Microsoft GPG key (Fedora/RHEL)
  ansible.builtin.rpm_key:
    key: https://packages.microsoft.com/keys/microsoft.asc
    state: present
  become: true
  when: az_check.rc != 0

- name: Add Azure CLI repository (Fedora/RHEL)
  ansible.builtin.yum_repository:
    name: azure-cli
    description: Azure CLI
    baseurl: https://packages.microsoft.com/yumrepos/azure-cli
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
    gpgcheck: yes
    enabled: yes
  become: true
  when: az_check.rc != 0

- name: Install Azure CLI (Fedora/RHEL)
  ansible.builtin.dnf:
    name: azure-cli
    state: present
  become: true
  register: az_install
  when: az_check.rc != 0

- name: Verify Azure CLI installation
  ansible.builtin.command: az version --output json
  register: az_verify
  changed_when: false
  failed_when: az_verify.rc != 0

- name: Parse Azure CLI version
  ansible.builtin.set_fact:
    az_version: "{{ (az_verify.stdout | from_json)['azure-cli'] }}"
  when: az_verify.rc == 0

- name: Display installation summary
  ansible.builtin.debug:
    msg:
      - "Azure CLI installed on {{ inventory_hostname }}"
      - "Version: {{ az_version | default('Unknown') }}"
      - "Binary: {{ azure_cli_binary }}"
      - "Key Vault: {{ azure_keyvault_name }}"
      - "Note: Run 'az login' to authenticate before accessing Key Vault"
