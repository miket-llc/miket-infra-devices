---
- name: Restart observability stack
  ansible.builtin.systemd:
    name: "{{ observability_service_name }}"
    state: restarted
    daemon_reload: true
  when: observability_enabled | bool

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reload prometheus
  # SIGHUP is now sufficient: we directory-mount {{ observability_workdir
  # }}/prometheus/rules/ into the container (not individual files), so
  # path→inode resolves fresh on every read. The previous file-bind mount
  # was inode-pinned and required a full `podman restart` to pick up
  # ansible's tmp+rename template writes. Now a signal is enough.
  ansible.builtin.command: >-
    podman kill --signal SIGHUP prometheus
  failed_when: false
