---
# Handlers for nvidia_gpu_fedora role

- name: rebuild akmods
  ansible.builtin.command: akmods --force
  async: "{{ nvidia_gpu_akmods_wait }}"
  poll: 10

- name: regenerate initramfs
  ansible.builtin.command: dracut --force
  changed_when: true






