---
# Ansible role: deemphasize_legacy_remote
# Removes RDP/VNC configurations for our infrastructure (protocols fully retired)
# Part of NoMachine endpoint normalization - CORRECTED VERSION
# RDP/VNC are RETIRED (not "break-glass") - remove all references to our infrastructure

- name: Remove RDP/VNC configurations on Windows
  block:
    - name: Remove any saved RDP connections to our infrastructure (Windows)
      ansible.windows.win_shell: |
        $rdpFiles = @(
          "$env:USERPROFILE\Documents\*.rdp",
          "$env:APPDATA\Microsoft\Terminal Server Client\*.rdp"
        )
        
        $removed = 0
        foreach ($pattern in $rdpFiles) {
          Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | ForEach-Object {
            $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            # Remove RDP files connecting to our infrastructure
            if ($content -match "motoko|wintermute|armitage|pangolin-vega") {
              Remove-Item $_.FullName -Force -ErrorAction SilentlyContinue
              $removed++
            }
          }
        }
        
        if ($removed -gt 0) {
          Write-Output "Removed $removed RDP connection file(s) for our infrastructure"
        } else {
          Write-Output "No RDP connections to our infrastructure found"
        }
      register: rdp_remove_windows
      changed_when: "'Removed' in rdp_remove_windows.stdout and 'Removed 0' not in rdp_remove_windows.stdout"

    - name: Remove RDP shortcuts from Start Menu and Desktop (Windows)
      ansible.windows.win_shell: |
        $locations = @(
          "$env:APPDATA\Microsoft\Windows\Start Menu\Programs",
          "$env:USERPROFILE\Desktop"
        )
        
        $removed = 0
        foreach ($location in $locations) {
          if (Test-Path $location) {
            Get-ChildItem -Path $location -Recurse -Filter "*.rdp" -ErrorAction SilentlyContinue | ForEach-Object {
              $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
              if ($content -match "motoko|wintermute|armitage|pangolin-vega") {
                Remove-Item $_.FullName -Force -ErrorAction SilentlyContinue
                $removed++
              }
            }
          }
        }
        
        if ($removed -gt 0) {
          Write-Output "Removed $removed RDP shortcut(s)"
        } else {
          Write-Output "No RDP shortcuts to our infrastructure found"
        }
      register: rdp_shortcuts_remove
      changed_when: "'Removed' in rdp_shortcuts_remove.stdout and 'Removed 0' not in rdp_shortcuts_remove.stdout"

    - name: Create informational note about simplified remote access (Windows)
      ansible.windows.win_copy:
        content: |
          # Remote Access Guide (Updated 2025-11-22)
          
          ## Our Infrastructure Uses Two Tools Only:
          
          1. GUI/Desktop Access: NoMachine
             - Use: Start Menu > NoMachine
             - Or CLI: nomachine-connect [hostname]
             - Servers: motoko, wintermute, armitage
             - Port: 4000 via Tailscale
          
          2. Administrative Shell: Tailscale SSH
             - Use: ssh user@hostname.pangolin-vega.ts.net
             - Or: tailscale ssh user@hostname
          
          ## What Changed:
          
          RDP and VNC have been RETIRED from our infrastructure:
          - NoMachine provides better performance and features
          - Simpler security model (one tool, not three)
          - Easier to support and troubleshoot
          
          ## For Other Systems:
          
          Your RDP/VNC clients may still be installed for accessing OTHER systems
          (external clients, work VPNs, etc.) - that's fine! We've only removed
          configurations specific to our infrastructure (motoko, wintermute, armitage).
          
          Use NoMachine for our infrastructure, RDP/VNC for everything else.
        dest: "C:\\Users\\{{ ansible_user }}\\Desktop\\REMOTE-ACCESS-GUIDE.txt"
  when: ansible_os_family == "Windows"

- name: Remove RDP/VNC configurations on macOS
  block:
    - name: Remove VNC/RDP bookmarks for our infrastructure (macOS)
      ansible.builtin.shell: |
        # Remove VNC bookmarks in various apps that might exist
        REMOVED=0
        
        # Remove Screen Sharing bookmarks (if they exist)
        if [ -d "$HOME/Library/Preferences" ]; then
          find "$HOME/Library/Preferences" -name "*ScreenSharing*" -o -name "*VNC*" 2>/dev/null | while read -r f; do
            if grep -q "motoko\|wintermute\|armitage\|pangolin-vega" "$f" 2>/dev/null; then
              rm -f "$f" && REMOVED=$((REMOVED + 1))
            fi
          done
        fi
        
        # Remove any .rdp or .vnc files in Documents
        find "$HOME/Documents" -type f \( -name "*.rdp" -o -name "*.vnc" \) 2>/dev/null | while read -r f; do
          if grep -q "motoko\|wintermute\|armitage\|pangolin-vega" "$f" 2>/dev/null; then
            rm -f "$f" && REMOVED=$((REMOVED + 1))
          fi
        done
        
        if [ $REMOVED -gt 0 ]; then
          echo "Removed $REMOVED VNC/RDP configuration(s) for our infrastructure"
        else
          echo "No VNC/RDP configurations to our infrastructure found"
        fi
      register: vnc_remove_macos
      changed_when: "'Removed' in vnc_remove_macos.stdout and 'Removed 0' not in vnc_remove_macos.stdout"

    - name: Create informational note about simplified remote access (macOS)
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/Desktop/REMOTE-ACCESS-GUIDE.txt"
        content: |
          # Remote Access Guide (Updated 2025-11-22)
          
          ## Our Infrastructure Uses Two Tools Only:
          
          1. GUI/Desktop Access: NoMachine
             - Use: /Applications/NoMachine.app
             - Or CLI: nomachine-connect [hostname]
             - Servers: motoko, wintermute, armitage
             - Port: 4000 via Tailscale
          
          2. Administrative Shell: Tailscale SSH
             - Use: ssh user@hostname.pangolin-vega.ts.net
             - Or: tailscale ssh user@hostname
          
          ## What Changed:
          
          RDP and VNC have been RETIRED from our infrastructure:
          - NoMachine provides better performance and features
          - Simpler security model (one tool, not three)
          - Easier to support and troubleshoot
          
          ## For Other Systems:
          
          Your RDP/VNC clients may still be installed for accessing OTHER systems
          (external clients, work VPNs, etc.) - that's fine! We've only removed
          configurations specific to our infrastructure (motoko, wintermute, armitage).
          
          Use NoMachine for our infrastructure, Screen Sharing/VNC for everything else.
        mode: '0644'
  when: ansible_system == "Darwin"

- name: Remove RDP/VNC configurations on Linux
  block:
    - name: Remove VNC/RDP configurations for our infrastructure (Linux)
      ansible.builtin.shell: |
        REMOVED=0
        
        # Remove Remmina profiles (if they exist)
        if [ -d "$HOME/.local/share/remmina" ]; then
          find "$HOME/.local/share/remmina" -name "*.remmina" 2>/dev/null | while read -r f; do
            if grep -q "motoko\|wintermute\|armitage\|pangolin-vega" "$f" 2>/dev/null; then
              rm -f "$f" && REMOVED=$((REMOVED + 1))
            fi
          done
        fi
        
        # Remove any .rdp or .vnc files
        find "$HOME" -maxdepth 3 -type f \( -name "*.rdp" -o -name "*.vnc" \) 2>/dev/null | while read -r f; do
          if grep -q "motoko\|wintermute\|armitage\|pangolin-vega" "$f" 2>/dev/null; then
            rm -f "$f" && REMOVED=$((REMOVED + 1))
          fi
        done
        
        if [ $REMOVED -gt 0 ]; then
          echo "Removed $REMOVED VNC/RDP configuration(s) for our infrastructure"
        else
          echo "No VNC/RDP configurations to our infrastructure found"
        fi
      register: vnc_remove_linux
      changed_when: "'Removed' in vnc_remove_linux.stdout and 'Removed 0' not in vnc_remove_linux.stdout"

    - name: Create informational note about simplified remote access (Linux)
      ansible.builtin.copy:
        dest: "{{ ansible_env.HOME }}/Desktop/REMOTE-ACCESS-GUIDE.txt"
        content: |
          # Remote Access Guide (Updated 2025-11-22)
          
          ## Our Infrastructure Uses Two Tools Only:
          
          1. GUI/Desktop Access: NoMachine
             - Use: /usr/NX/bin/nxplayer
             - Or CLI: nomachine-connect [hostname]
             - Servers: motoko, wintermute, armitage
             - Port: 4000 via Tailscale
          
          2. Administrative Shell: Tailscale SSH
             - Use: ssh user@hostname.pangolin-vega.ts.net
             - Or: tailscale ssh user@hostname
          
          ## What Changed:
          
          RDP and VNC have been RETIRED from our infrastructure:
          - NoMachine provides better performance and features
          - Simpler security model (one tool, not three)
          - Easier to support and troubleshoot
          
          ## For Other Systems:
          
          Your RDP/VNC clients may still be installed for accessing OTHER systems
          (external clients, work VPNs, etc.) - that's fine! We've only removed
          configurations specific to our infrastructure (motoko, wintermute, armitage).
          
          Use NoMachine for our infrastructure, VNC/RDP for everything else.
        mode: '0644'
  when: ansible_system == "Linux"
