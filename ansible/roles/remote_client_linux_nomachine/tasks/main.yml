---
# Ansible role: remote_client_linux_nomachine
# Installs NoMachine client on Linux hosts for accessing remote NoMachine servers

- name: Check if NoMachine client is already installed
  ansible.builtin.stat:
    path: /usr/NX/bin/nxplayer
  register: nomachine_client_bin

- name: Download NoMachine client installer (.run format)
  ansible.builtin.shell: |
    cd /tmp
    curl -L -f -o nomachine_{{ nomachine_version }}_4_x86_64.run "https://download.nomachine.com/download/8.x/Linux/nomachine_{{ nomachine_version }}_4_x86_64.run" || \
    wget -O nomachine_{{ nomachine_version }}_4_x86_64.run "https://download.nomachine.com/download/8.x/Linux/nomachine_{{ nomachine_version }}_4_x86_64.run"
    chmod +x nomachine_{{ nomachine_version }}_4_x86_64.run
  args:
    creates: "/tmp/nomachine_{{ nomachine_version }}_4_x86_64.run"
  when: not nomachine_client_bin.stat.exists
  become: true

- name: Install NoMachine client
  ansible.builtin.command:
    cmd: "/tmp/nomachine_{{ nomachine_version }}_4_x86_64.run install"
    creates: "/usr/NX/bin/nxplayer"
  become: true
  when: not nomachine_client_bin.stat.exists

- name: Clean up installer
  ansible.builtin.file:
    path: "/tmp/nomachine_{{ nomachine_version }}_4_x86_64.run"
    state: absent
  become: true

- name: Ensure NoMachine config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.nx"
    state: directory
    mode: '0755'
  when: nomachine_client_bin.stat.exists

- name: Archive existing broken or stale connections (Linux)
  ansible.builtin.shell: |
    ARCHIVE_DIR="{{ ansible_env.HOME }}/.nx/archive-$(date +%Y%m%d)"
    mkdir -p "$ARCHIVE_DIR"
    # Archive connections that don't match our standard servers
    find "{{ ansible_env.HOME }}/.nx" -maxdepth 2 -name "*.nxs" -o -name "*.nxp" 2>/dev/null | while read f; do
      if ! grep -q "pangolin-vega.ts.net:4000" "$f" 2>/dev/null; then
        mv "$f" "$ARCHIVE_DIR/" 2>/dev/null || true
      fi
    done
    # Only report if we actually archived something
    if [ -d "$ARCHIVE_DIR" ] && [ "$(ls -A "$ARCHIVE_DIR" 2>/dev/null)" ]; then
      echo "Archived stale connections to $ARCHIVE_DIR"
    else
      rmdir "$ARCHIVE_DIR" 2>/dev/null || true
      echo "No stale connections to archive"
    fi
  register: archive_result_linux
  changed_when: "'Archived' in archive_result_linux.stdout"
  when: nomachine_client_bin.stat.exists

- name: Create NoMachine connection helper script (Linux)
  ansible.builtin.template:
    src: nomachine_connect.sh.j2
    dest: /usr/local/bin/nomachine-connect
    mode: '0755'
  become: true
  when: nomachine_client_bin.stat.exists

- name: Create connection documentation (Linux)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.nx/CONNECTIONS.txt"
    content: |
      # NoMachine Saved Connections
      # Auto-generated by Ansible - Do not edit manually
      
      To connect to a server, use one of these methods:
      
      1. Command line:
         nomachine-connect motoko
         nomachine-connect wintermute
         nomachine-connect armitage
      
      2. GUI:
         Run 'nxplayer' or open NoMachine from Applications menu, then manually add:
         - motoko-console: motoko.pangolin-vega.ts.net:4000
         - wintermute-console: wintermute.pangolin-vega.ts.net:4000
         - armitage-console: armitage.pangolin-vega.ts.net:4000
      
      All connections use Tailscale MagicDNS and port 4000.
    mode: '0644'
  when: nomachine_client_bin.stat.exists

- name: Display NoMachine client installation status
  ansible.builtin.debug:
    msg:
      - "✅ NoMachine client installed and configured"
      - "Launch from: Applications menu > NoMachine or run 'nxplayer'"
      - "Command line: nomachine-connect [HOSTNAME]"
      - "Saved connections:"
      - "  - motoko-console (motoko.pangolin-vega.ts.net:4000)"
      - "  - wintermute-console (wintermute.pangolin-vega.ts.net:4000)"
      - "  - armitage-console (armitage.pangolin-vega.ts.net:4000)"


