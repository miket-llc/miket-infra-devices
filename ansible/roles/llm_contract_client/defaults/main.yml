---
# LLM Contract Client defaults

# Directory for LLM client configuration
llm_config_dir: /etc/miket/llm

# LiteLLM gateway configuration
# Canonical gateway is on akira; motoko does not run LiteLLM. Port 4000 is
# reserved for LiteLLM on akira (NoMachine on akira moved to 4020).
llm_gateway_base_url: "http://akira.pangolin-vega.ts.net:4000/v1"
llm_gateway_health_url: "http://akira.pangolin-vega.ts.net:4000/health"

# Default role for different applications
llm_default_roles:
  openhands: coder
  claude_code: coder
  aider: coder
  continue: coder
  obsidian: chat
  rag: encoder

# Contract schema version
llm_contract_version: "1.0.0"
