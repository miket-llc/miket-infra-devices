---
# LLM Contract Client - Main tasks
# Distributes LLM Contract to clients for AI Fabric integration

- name: Include Linux tasks
  ansible.builtin.include_tasks: linux.yml
  when: ansible_os_family in ['RedHat', 'Debian', 'Suse', 'Archlinux']

- name: Include macOS tasks
  ansible.builtin.include_tasks: darwin.yml
  when: ansible_os_family == 'Darwin'

- name: Include Windows tasks
  ansible.builtin.include_tasks: windows.yml
  when: ansible_system == 'Win32NT'
