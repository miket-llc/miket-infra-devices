# Podman-Only Guardrail - miket-infra-devices
# Prevents Docker daemon/runtime references from being reintroduced
# Platform Standard: Podman-only for all container workloads
#
# Note: Docker CLI compatibility (via podman-docker) is allowed and expected.
# This guardrail blocks Docker daemon/runtime usage, not CLI muscle memory.
#
# Reference: docs/reference/CONTAINERS_RUNTIME_STANDARD.md

name: Podman-Only Guardrail

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  check-no-docker-daemon:
    name: Verify No Docker Daemon References
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Docker daemon/runtime references
        id: docker-check
        shell: python
        run: |
          """Scan the tree for Docker daemon/runtime references.

          Written in Python rather than bash so the exit-code semantics are
          explicit — the earlier bash implementation kept tripping
          `set -eo pipefail` (GH Actions' default) on empty grep results and
          dying in the first 0.5s before emitting any diagnostic output.
          """
          import os, re, sys

          DAEMON_PATTERNS = [
              r"systemctl.*docker",
              r"docker\.service",
              r"docker\.socket",
              r"moby-engine",
              r"docker-ce",
              r"Docker Desktop",
              r"docker daemon",
          ]
          ANSIBLE_PATTERNS = [
              r"community\.docker",
              r"docker_container:",
              r"docker_image:",
              r"docker_network:",
              r"docker_volume:",
          ]

          # Paths to exclude (substring match against each file's relative path).
          # Rationale for each entry:
          #  - docs/archive|migration: retained historical content
          #  - the guardrail workflow itself: lists the patterns it's scanning for
          #  - docker_cleanup_linux, docker_prevention, podman_base(main),
          #    podman_standard_linux, podman_desktop_macos, podman_desktop_windows:
          #    roles whose purpose is to remove/detect/warn about Docker
          #  - remove-docker-fleet.yml, docker-prevention.yml: uninstall playbooks
          #  - /legacy/, backups/: known-legacy content retained for reference
          #  - devices/wintermute/scripts/: wintermute still runs vLLM under
          #    Docker Desktop; Podman Desktop migration is a separate track.
          EXCLUDE_PATHS = [
              "docs/archive/",
              "docs/migration/",
              ".github/workflows/podman-only-guardrail.yml",
              "ansible/roles/docker_cleanup_linux/",
              "ansible/roles/docker_prevention/",
              "ansible/roles/podman_base/tasks/main.yml",
              "ansible/roles/podman_standard_linux/",
              "ansible/roles/podman_desktop_macos/",
              "ansible/roles/podman_desktop_windows/",
              "ansible/playbooks/remove-docker-fleet.yml",
              "ansible/playbooks/docker-prevention.yml",
              "/legacy/",
              "backups/",
              "devices/wintermute/scripts/",
          ]
          LINE_EXCLUDES = ["# podman-docker", "podman-docker package"]

          DAEMON_EXTS = (".yml", ".yaml", ".sh", ".ps1")

          def excluded_path(rel: str) -> bool:
              return any(e in rel for e in EXCLUDE_PATHS)

          def excluded_line(line: str) -> bool:
              return any(e in line for e in LINE_EXCLUDES)

          def scan(patterns, extensions, roots):
              regexes = [(p, re.compile(p)) for p in patterns]
              hits = []
              for root in roots:
                  for dirpath, _dirs, files in os.walk(root):
                      if ".git" in dirpath.split(os.sep):
                          continue
                      for fname in files:
                          if not fname.endswith(extensions):
                              continue
                          rel = os.path.relpath(os.path.join(dirpath, fname), ".")
                          if excluded_path(rel):
                              continue
                          try:
                              with open(rel, errors="replace") as f:
                                  for i, line in enumerate(f, 1):
                                      if excluded_line(line):
                                          continue
                                      for raw, rx in regexes:
                                          if rx.search(line):
                                              hits.append((raw, rel, i, line.rstrip()))
                          except OSError:
                              continue
              return hits

          def scan_filenames(globs, roots):
              import fnmatch
              hits = []
              for root in roots:
                  for dirpath, _dirs, files in os.walk(root):
                      if ".git" in dirpath.split(os.sep):
                          continue
                      for fname in files:
                          rel = os.path.relpath(os.path.join(dirpath, fname), ".")
                          if excluded_path(rel):
                              continue
                          if any(fnmatch.fnmatch(fname, g) for g in globs):
                              hits.append(rel)
              return hits

          print("🔍 Scanning for Docker daemon/runtime references...\n")
          found = False

          print("📁 Checking for Docker daemon/service references...")
          daemon_hits = scan(DAEMON_PATTERNS, DAEMON_EXTS, ["."])
          if daemon_hits:
              for p, path, lineno, line in daemon_hits[:50]:
                  print(f"  {path}:{lineno}: {line.strip()}  [matched: {p}]")
              print(f"⚠️  {len(daemon_hits)} daemon-pattern hit(s)")
              found = True
          else:
              print("✅ No Docker daemon references found")

          print("\n📁 Checking for Docker Ansible module usage...")
          ansible_hits = scan(ANSIBLE_PATTERNS, (".yml", ".yaml"), ["ansible"])
          if ansible_hits:
              for p, path, lineno, line in ansible_hits[:50]:
                  print(f"  {path}:{lineno}: {line.strip()}  [matched: {p}]")
              print(f"❌ {len(ansible_hits)} Docker Ansible module hit(s)")
              found = True
          else:
              print("✅ No Docker Ansible modules found")

          print("\n📁 Checking for docker-compose files...")
          compose_hits = scan_filenames(["docker-compose*.yml", "docker-compose*.yaml"], ["."])
          if compose_hits:
              for path in compose_hits:
                  print(f"  {path}")
              print(f"❌ docker-compose file(s) found (should be podman-compose)")
              found = True
          else:
              print("✅ No docker-compose files found")

          print("\n📁 Checking for Dockerfiles...")
          dockerfile_hits = scan_filenames(["Dockerfile*"], ["."])
          if dockerfile_hits:
              for path in dockerfile_hits:
                  print(f"  {path}")
              print("⚠️  Dockerfile(s) found (warning only — Dockerfiles work with Podman)")
          else:
              print("✅ No Dockerfiles found")

          print()
          if found:
              print("═══════════════════════════════════════════════════════════════")
              print("❌ GUARDRAIL VIOLATION: Docker daemon/module references detected")
              print()
              print("Platform Standard: Podman-only (no Docker daemon)")
              print("Docker CLI compatibility (via podman-docker) is allowed;")
              print("Docker daemon, service, or Ansible module usage is NOT.")
              print()
              print("Reference: docs/reference/CONTAINERS_RUNTIME_STANDARD.md")
              print("═══════════════════════════════════════════════════════════════")
              sys.exit(1)

          print("═══════════════════════════════════════════════════════════════")
          print("✅ GUARDRAIL PASSED: No Docker daemon/module references found")
          print()
          print("Note: Docker CLI commands (docker ps, docker run) are allowed")
          print("      as they map to Podman via podman-docker compatibility.")
          print("═══════════════════════════════════════════════════════════════")

      - name: Report Docker CLI compatibility references (info only)
        if: always()
        shell: bash
        run: |
          set +e
          echo ""
          echo "ℹ️  Docker CLI compatibility mentions (expected, these map to Podman):"
          grep -rn "docker ps\|docker run\|docker build\|docker exec" . --include="*.md" 2>/dev/null \
            | grep -v "docs/archive/" | head -10
          if [ $? -ne 0 ]; then echo "  None found in active docs"; fi
          echo ""
          echo "These CLI commands work because podman-docker provides compatibility."
