# devices/atom/config.yml
# Device configuration for atom - Hacker/Radio Node (SDR + Security Research)
#
# Converted from Fedora Workstation 2025-12
# Migration playbook: ansible/playbooks/atom/convert-to-headless.yml

device:
  hostname: atom
  fqdn: atom.pangolin-vega.ts.net
  os: Fedora 43 Server
  codename: headless
  desktop_environment: none  # Headless - no GUI
  type: Hacker/Radio Lab Node
  
  roles:
    - lab_server
    - headless
    - hacker_radio
  
  flags:
    lab_server: true
    headless: true
    hacker_radio: true
    battery_backed: false
  
  hardware:
    manufacturer: Lenovo
    model: ThinkPad X1 Carbon (1st Gen, 2012)
    cpu: Intel Core i7-3667U
    cpu_cores: 2
    cpu_threads: 4
    gpu: Intel HD Graphics 4000 (integrated, unused)
    gpu_compute_capable: false
    memory_gb: 8
    storage:
      - device: sda
        model: Internal SSD
        size_gb: 224
        type: SSD
        purpose: Boot + OS
        partitions:
          - mount: /
            filesystem: ext4
    battery: true
    battery_notes: |
      Laptop battery provides portability for field use.
      Not relied upon as a resilience/UPS device.

  operating_system:
    os: Fedora
    version: "43"
    codename: server
    kernel: "6.x"
    desktop_environment: none
    display_server: none
    display_manager: none
    boot_target: multi-user.target

  network:
    tailscale:
      enabled: true
      hostname: atom
      ip: 100.120.122.13
      tags:
        - tag:server
        - tag:linux
        - tag:lab-server
        - tag:headless
      auth_key_akv_secret: tailscale-auth-key-atom
    ssh:
      enabled: true
      auth: key_only
      tailnet_only: true  # SSH ONLY via Tailscale, not LAN
      port: 22
    firewall: firewalld
    firewall_policy: tailnet-only

  services:
    - tailscaled          # Tailscale daemon
    - firewalld           # Firewall
    - prometheus-node-exporter  # Metrics for Prometheus
    - sshd                # SSH server
    # NOT running:
    # - gdm/sddm (headless)
    # - podman/docker (not a container host)
    # - vllm/litellm (no GPU compute)

  monitoring:
    node_exporter:
      enabled: true
      port: 9100
    netdata:
      enabled: true
      lightweight_mode: true  # Minimal resource usage

  power:
    battery:
      low_warning_percent: 5
      critical_percent: 2
      critical_action: shutdown
    lid_switch: ignore      # Keep running with lid closed
    idle_action: ignore     # Never sleep
    suspend: masked         # Prevent all suspend/hibernate
    
  filesystem:
    # Minimal filesystem - no /space, /flux, /time mounts
    # Lightweight node - no external storage dependencies
    notes: |
      atom does NOT mount /space, /flux, or /time.
      Lightweight hacker node with no dependencies on motoko.

      INCIDENT (2024-12-01): CIFS mounts caused kernel panic when motoko
      was unreachable. Removed and never re-added.

      If you need data from motoko, use SSH/SCP on-demand.

  selinux:
    mode: enforcing
    permissive_domains:
      - sshd_t  # Technical debt: Tailscale SSH workaround

  accounts:
    automation: mdt
    interactive: []  # No interactive users - headless

  security:
    ssh_tailnet_only: true
    no_lan_ssh: true
    firewall_zones:
      public: []  # No services on public zone
      tailnet:
        - ssh
        - node-exporter

notes: |
  atom - Hacker/Radio Node (SDR + Security Research)

  ═══════════════════════════════════════════════════════════════
  CORE MISSION: Hobby/hacker node for radio and security research
  ═══════════════════════════════════════════════════════════════

  Design Principles:
    - Simplicity over features (minimal services)
    - Lightweight tiling WM (Sway/i3)
    - Zero external dependencies (no mounts to other servers)
    - All management via Tailscale (no direct LAN access)
    - 100% IaC/CaC (no manual commands on device)

  Conversion History:
    - 2025-12: Converted from Fedora Workstation 43 (GNOME) to basecamp UI
    - Migration playbook: playbooks/atom/convert-to-headless.yml

  What This Device DOES:
    ✓ SDR and RF experimentation
    ✓ Network analysis and security research
    ✓ Serial communication and LoRa development
    ✓ Lightweight portable hacker workstation

  What This Device Does NOT Do:
    ✗ Container hosting (not enough RAM)
    ✗ AI/LLM workloads (no GPU compute)
    ✗ Storage (no mounts, no SoR responsibilities)
    ✗ Always-on resilience (not a resilience node)
  
  Access:
    - SSH: ssh atom.pangolin-vega.ts.net (tailnet only)
    - Metrics: http://atom.pangolin-vega.ts.net:9100/metrics
    - No remote desktop (headless)


